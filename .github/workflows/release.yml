name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
          - os: windows-latest
            target: windows-amd64
          - os: macos-latest
            target: macos-amd64
          - os: macos-latest
            target: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tables,docx,ocr-tesseract,ocr-llm]"

      - name: Build onefile executable
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: pdf2any/__main__.py
          mode: onefile
          output-dir: build
          output-file: ${{ matrix.target == 'windows-amd64' && 'pdf2any-windows-amd64.exe' || format('pdf2any-{0}', matrix.target) }}
          include-package: pdf2any
          enable-plugins: anti-bloat
          follow-import-to: pdf2any
          nofollow-import-to: pymupdf
          onefile-tempdir-spec: '{CACHE_DIR}/pdf2any'
          assume-yes-for-downloads: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf2any-${{ matrix.target }}
          path: |
            build/pdf2any*
            build/*.exe
          include-hidden-files: true

      - name: Make executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x build/pdf2any*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect and rename artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "pdf2any*" -o -name "*.exe" \) -exec cp {} release/ \;
          ls -la release/

      - name: Copy installer scripts
        run: |
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1
          chmod +x release/install.sh

      - name: Generate checksums
        run: python scripts/generate_checksums.py release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/pdf2any-*
            release/install.sh
            release/install.ps1
            release/checksums.txt
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
